        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{fontSize:9,color:'#10b981',fontWeight:700,display:'flex',alignItems:'center',gap:3}}>
            <span style={{width:5,height:5,borderRadius:'50%',background:'#10b981',display:'inline-block',animation:'pulse 1.5s infinite'}}/>
            ALL CONNECTIONS LIVE
          </div>
          <div style={{fontSize:9,color:'#6b7280'}}>HUB ENGINE V4</div>
        </div>
      </div>

      {/* Content area */}
      <div style={S.content}>
        {tab==='home'&&renderHome()}
        {tab==='actors'&&renderActors()}
        {tab==='studio'&&renderStudio()}
        {tab==='workflow'&&renderWorkflow()}
        {tab==='bizVideo'&&renderBizVideo()}
        {tab==='pdf'&&renderPDF()}
      </div>

      {/* Chat pages (full height flex layout) */}
      {(tab==='becky'||tab==='jobs')&&(
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
          {tab==='becky'&&(
            <div style={{padding:'8px 12px',background:'#0a0c10',borderBottom:'1px solid #1e2433',flexShrink:0,display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:32,height:32,borderRadius:9,background:`linear-gradient(135deg,${GOLD},#c06000)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>🎙</div>
              <div><div style={{fontSize:13,fontWeight:800,color:GOLD}}>BECKY — Production Manager</div><div style={{fontSize:9,color:apiKey?'#10b981':'#ef4444'}}>{apiKey?'● POWERED · Ready to build':'● ADD API KEY IN HOME TAB'}</div></div>
            </div>
          )}
          {tab==='jobs'&&(
            <div style={{padding:'8px 12px',background:'#0a0c10',borderBottom:'1px solid #1e2433',flexShrink:0,display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:32,height:32,borderRadius:9,background:'linear-gradient(135deg,#fb923c,#c06000)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>💼</div>
              <div><div style={{fontSize:13,fontWeight:800,color:'#fb923c'}}>JOB SEARCH — Career Coach</div><div style={{fontSize:9,color:'#6b7280'}}>Orange TX · SE Texas · Operations roles</div></div>
            </div>
          )}
          <div style={{flex:1,minHeight:0}}>
            {tab==='becky'&&renderChat(beckyMsgs,beckyLoading,beckyInput,setBeckyInput,sendBecky,beckyChatRef,
              ["Build today's video","Week's 5 scripts","Lisa Vidnoz promo","Alisha affiliate show","Paul + Becky podcast","Lisa + Becky news show","Google Stitch landing page","Social captions all platforms"],
              "Tell Becky what to build — she delivers the complete package"
            )}
            {tab==='jobs'&&renderChat(jobMsgs,jobLoading,jobInput,setJobInput,sendJob,jobChatRef,
              ["Write cover letter","Interview prep","Resume tips","Job search strategy","List jobs in Orange TX","Salary negotiation"],
              "Ask your career coach anything about your job search"
            )}
          </div>
        </div>
      )}

      {/* Bottom Nav — scrollable */}
      <div style={{...S.bottomNav,overflowX:'auto',flexShrink:0}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={S.navBtn(tab===n.id)}>
            <span style={{fontSize:17}}>{n.e}</span>
            <span style={{fontSize:8,fontWeight:800,color:tab===n.id?GOLD:'#3a4156',letterSpacing:'0.04em',whiteSpace:'nowrap'}}>{n.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
